# Run BSya UMKM+ reusing the existing nalarx PostgreSQL (container "nalarx-dashboard"
# on network "nalarx_default", database "bsya"). No new Postgres container is created.
#
# Host ports chosen to avoid conflicts with already-running apps
# (3000 → nalarx-web, 8000 → nalarx-ai, 8080/8090 → other node servers):
#   frontend → http://localhost:3100
#   backend  → http://localhost:8081
#
# Usage:  docker compose -f docker-compose.nalarx.yml up --build -d
name: bsya-umkm

services:
  backend:
    build: ./backend
    container_name: bsya-backend
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://nalarx:nalarx_secret@nalarx-dashboard:5432/bsya?sslmode=disable"
      ALLOWED_ORIGINS: "http://localhost:3100"
      # AWS_REGION / BEDROCK_MODEL_ID empty → AI endpoints return mock responses.
    ports:
      - "8081:8080"
    networks:
      - nalarx
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8081"
    container_name: bsya-frontend
    ports:
      - "3100:3000"
    depends_on:
      - backend
    networks:
      - nalarx
    restart: unless-stopped

networks:
  # The pre-existing network created by the nalarx stack (holds nalarx-dashboard).
  nalarx:
    external: true
    name: nalarx_default
